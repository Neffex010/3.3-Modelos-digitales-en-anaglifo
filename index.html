<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <title>Visor Anaglifo - Modelo Mixamo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">

    <!-- Enlazamos el nuevo CSS limpio -->
    <link rel="stylesheet" href="./main.css">
</head>
<body>
    <!-- Instrucciones simples en pantalla -->
    <div class="instructions">
        <h1>VISOR 3D ANAGLIFO</h1>
        <p>Ponte tus lentes Rojo/Cian. Usa el mouse para rotar el modelo y la rueda para hacer zoom.</p>

    <!-- CONTENEDOR 3D -->
    <main id="app">

    <!-- MAPA DE IMPORTACIÓN LOCAL (Apunta a tus carpetas build y jsm) -->
    <script type="importmap">
    {
        "imports": {
            "three": "./build/three.module.js",
            "three/addons/": "./jsm/"
        }
    }
    </script>

    <!-- Script principal -->
    <script type="module" src="./main.js"></script>
